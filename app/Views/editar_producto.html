{% extends "layout.html" %}

{% block title %}Editar | {{ producto.nombre }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-5">
                    <div class="d-flex align-items-center mb-4">
                        <a href="{{ url_for('main.dashboard') }}" class="btn btn-light rounded-circle me-3">
                            <i class="bi bi-arrow-left"></i>
                        </a>
                        <h3 class="fw-bold mb-0">Editar Producto</h3>
                    </div>

                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-uppercase">Nombre del Producto</label>
                            <input type="text" name="nombre" class="form-control form-control-lg border-0 bg-light rounded-3" value="{{ producto.nombre }}" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold small text-uppercase">Precio ($)</label>
                                <input type="number" step="0.01" name="precio" class="form-control form-control-lg border-0 bg-light rounded-3" value="{{ producto.precio }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold small text-uppercase">Stock</label>
                                <input type="number" name="stock" class="form-control form-control-lg border-0 bg-light rounded-3" value="{{ producto.stock }}" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold small text-uppercase">Descripción</label>
                            <textarea name="descripcion" class="form-control border-0 bg-light rounded-3" rows="4">{{ producto.descripcion }}</textarea>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm">
                                Guardar Cambios
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
